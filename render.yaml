services:
  - type: web
    name: swipefile-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./dr_intel.db
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://swipefile-ruddy.vercel.app,https://swipefile-render.onrender.com
